name: Deploy — App VM

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/app-vm/**"
      - ".github/workflows/deploy-app-vm.yml"

jobs:
  deploy:
    name: Deploy infra stack to app VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate required secrets
        env:
          APP_VM_1_IP: ${{ secrets.APP_VM_1_IP }}
          APP_VM_1_SSH_KEY: ${{ secrets.APP_VM_1_SSH_KEY }}
          LOKI_PUSH_URL: ${{ secrets.LOKI_PUSH_URL }}
          PROMETHEUS_REMOTE_WRITE_URL: ${{ secrets.PROMETHEUS_REMOTE_WRITE_URL }}
          LOKI_PUSH_USER: ${{ secrets.LOKI_PUSH_USER }}
          LOKI_PUSH_PASSWORD: ${{ secrets.LOKI_PUSH_PASSWORD }}
          PROM_PUSH_USER: ${{ secrets.PROM_PUSH_USER }}
          PROM_PUSH_PASSWORD: ${{ secrets.PROM_PUSH_PASSWORD }}
        run: |
          missing=()
          [[ -z "$APP_VM_1_IP" ]] && missing+=("APP_VM_1_IP")
          [[ -z "$APP_VM_1_SSH_KEY" ]] && missing+=("APP_VM_1_SSH_KEY")
          [[ -z "$LOKI_PUSH_URL" ]] && missing+=("LOKI_PUSH_URL")
          [[ -z "$PROMETHEUS_REMOTE_WRITE_URL" ]] && missing+=("PROMETHEUS_REMOTE_WRITE_URL")
          [[ -z "$LOKI_PUSH_USER" ]] && missing+=("LOKI_PUSH_USER")
          [[ -z "$LOKI_PUSH_PASSWORD" ]] && missing+=("LOKI_PUSH_PASSWORD")
          [[ -z "$PROM_PUSH_USER" ]] && missing+=("PROM_PUSH_USER")
          [[ -z "$PROM_PUSH_PASSWORD" ]] && missing+=("PROM_PUSH_PASSWORD")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Deploy to app VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.APP_VM_1_IP }}
          username: deploy
          key: ${{ secrets.APP_VM_1_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR=/opt/cloud-web-apps

            echo "Syncing repository..."
            if [ -d "${DEPLOY_DIR}/.git" ]; then
              git -C "${DEPLOY_DIR}" pull --ff-only
            else
              git clone https://github.com/${{ github.repository }}.git "${DEPLOY_DIR}"
            fi

            echo "Writing/updating .env from secrets..."
            cat > "${DEPLOY_DIR}/infrastructure/app-vm/.env" <<ENVEOF
LOKI_PUSH_URL=${{ secrets.LOKI_PUSH_URL }}
LOKI_PUSH_USER=${{ secrets.LOKI_PUSH_USER }}
LOKI_PUSH_PASSWORD=${{ secrets.LOKI_PUSH_PASSWORD }}
PROMETHEUS_REMOTE_WRITE_URL=${{ secrets.PROMETHEUS_REMOTE_WRITE_URL }}
PROM_PUSH_USER=${{ secrets.PROM_PUSH_USER }}
PROM_PUSH_PASSWORD=${{ secrets.PROM_PUSH_PASSWORD }}
VM_HOSTNAME=apps-vm
ENVEOF
            chmod 600 "${DEPLOY_DIR}/infrastructure/app-vm/.env"

            echo "Pulling updated images..."
            docker compose -f "${DEPLOY_DIR}/infrastructure/app-vm/docker-compose.yml" pull

            echo "Restarting services..."
            docker compose -f "${DEPLOY_DIR}/infrastructure/app-vm/docker-compose.yml" up -d

            echo "Restarting Caddy to pick up config changes..."
            docker compose -f "${DEPLOY_DIR}/infrastructure/app-vm/docker-compose.yml" \
              restart caddy

            echo "Stack status:"
            docker compose -f "${DEPLOY_DIR}/infrastructure/app-vm/docker-compose.yml" ps
