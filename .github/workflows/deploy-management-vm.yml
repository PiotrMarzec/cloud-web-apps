name: Deploy — Management VM

on:
  push:
    branches:
      - main
    paths:
      - "infrastructure/management-vm/**"
      - ".github/workflows/deploy-management-vm.yml"

jobs:
  deploy:
    name: Deploy observability stack to management VM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          MGMT_VM_IP: ${{ secrets.MGMT_VM_IP }}
          MGMT_VM_SSH_KEY: ${{ secrets.MGMT_VM_SSH_KEY }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          OBSERVABILITY_DOMAIN: ${{ secrets.OBSERVABILITY_DOMAIN }}
        run: |
          missing=()
          [[ -z "$MGMT_VM_IP" ]] && missing+=("MGMT_VM_IP")
          [[ -z "$MGMT_VM_SSH_KEY" ]] && missing+=("MGMT_VM_SSH_KEY")
          [[ -z "$GRAFANA_ADMIN_PASSWORD" ]] && missing+=("GRAFANA_ADMIN_PASSWORD")
          [[ -z "$OBSERVABILITY_DOMAIN" ]] && missing+=("OBSERVABILITY_DOMAIN")
          if [[ ${#missing[@]} -gt 0 ]]; then
            echo "Missing required secrets: ${missing[*]}"
            exit 1
          fi

      - name: Deploy to management VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.MGMT_VM_IP }}
          username: deploy
          key: ${{ secrets.MGMT_VM_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR=/opt/cloud-web-apps

            echo "Ensuring deploy directory exists with correct ownership..."
            sudo mkdir -p "${DEPLOY_DIR}"
            sudo chown deploy:docker "${DEPLOY_DIR}"

            echo "Syncing repository..."
            if [ -d "${DEPLOY_DIR}/.git" ]; then
              git -C "${DEPLOY_DIR}" checkout -- .
              git -C "${DEPLOY_DIR}" pull --ff-only
            else
              git clone https://github.com/${{ github.repository }}.git "${DEPLOY_DIR}"
            fi

            echo "Writing/updating .env from secrets..."
            printf 'GRAFANA_ADMIN_PASSWORD=%s\nOBSERVABILITY_DOMAIN=%s\n' \
              '${{ secrets.GRAFANA_ADMIN_PASSWORD }}' \
              '${{ secrets.OBSERVABILITY_DOMAIN }}' \
              > "${DEPLOY_DIR}/infrastructure/management-vm/.env"

            echo "Generating Caddyfile with actual domain..."
            OBSERVABILITY_DOMAIN=${{ secrets.OBSERVABILITY_DOMAIN }} \
              envsubst '${OBSERVABILITY_DOMAIN}' \
              < "${DEPLOY_DIR}/infrastructure/management-vm/Caddyfile" \
              > "${DEPLOY_DIR}/infrastructure/management-vm/Caddyfile.rendered"
            cp "${DEPLOY_DIR}/infrastructure/management-vm/Caddyfile.rendered" \
               "${DEPLOY_DIR}/infrastructure/management-vm/Caddyfile"

            echo "Pulling updated images..."
            docker compose -f "${DEPLOY_DIR}/infrastructure/management-vm/docker-compose.yml" pull

            echo "Restarting services..."
            docker compose -f "${DEPLOY_DIR}/infrastructure/management-vm/docker-compose.yml" up -d

            echo "Reloading Prometheus config..."
            curl -s -X POST http://localhost:9090/-/reload || true

            echo "Stack status:"
            docker compose -f "${DEPLOY_DIR}/infrastructure/management-vm/docker-compose.yml" ps
