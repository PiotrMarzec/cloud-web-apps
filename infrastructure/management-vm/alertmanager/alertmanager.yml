global:
  resolve_timeout: 5m
  # SMTP configuration for email alerts (fill in or use Slack/PagerDuty instead)
  # smtp_smarthost: smtp.example.com:587
  # smtp_from: alertmanager@example.com
  # smtp_auth_username: alertmanager@example.com
  # smtp_auth_password: <secret>

# ---------------------------------------------------------------------------
# Routing tree
# ---------------------------------------------------------------------------
route:
  group_by: ["alertname", "host", "app"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: default

  routes:
    # Critical alerts — immediate notification
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 1h

    # Security alerts
    - match_re:
        alertname: "(BruteForceAttempt|High4xxRate|PossiblePortScan|SshLoginNewIp)"
      receiver: security
      repeat_interval: 2h

    # Info-level — lower priority channel
    - match:
        severity: info
      receiver: info-channel
      repeat_interval: 24h

# ---------------------------------------------------------------------------
# Receivers
# Uncomment / configure the channels you want to use.
# ---------------------------------------------------------------------------
