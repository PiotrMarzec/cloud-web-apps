global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    env: production

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# Load alerting rules
rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  # ---------------------------------------------------------------------------
  # Prometheus self-scrape
  # ---------------------------------------------------------------------------
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # ---------------------------------------------------------------------------
  # App VM metrics arrive via Grafana Alloy remote_write.
  # Prometheus accepts these when started with --web.enable-remote-write-receiver.
  # No scrape config needed here — node-exporter and cAdvisor are scraped by
  # Alloy on each app VM and pushed via remote_write.
  # ---------------------------------------------------------------------------
