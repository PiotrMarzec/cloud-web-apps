<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Temporarily Unavailable</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background-color: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      padding: 1.5rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    .icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background-color: #1e2533;
      margin-bottom: 2rem;
    }

    .icon svg {
      width: 36px;
      height: 36px;
      stroke: #6366f1;
      fill: none;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
    }

    p {
      font-size: 1rem;
      line-height: 1.6;
      color: #94a3b8;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #6366f1;
      border-radius: 2px;
      margin: 1.75rem auto;
      opacity: 0.6;
    }

    .hint {
      font-size: 0.875rem;
      color: #64748b;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    .dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6366f1;
      margin: 0 2px;
      animation: pulse 1.4s ease-in-out infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    .dots {
      display: inline-flex;
      align-items: center;
      vertical-align: middle;
      margin-left: 4px;
      gap: 2px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <!-- wrench / maintenance icon -->
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>

    <h1>This app is currently not available</h1>

    <p>
      We're deploying an update or performing maintenance.
      <br>Please try again in a moment
      <span class="dots">
        <span class="dot"></span>
        <span class="dot"></span>
        <span class="dot"></span>
      </span>
    </p>

    <div class="divider"></div>

    <p class="hint">If the problem persists, please contact the site owner.</p>
  </div>
</body>
</html>
